name: Build CANARY Packages (DEB + RPM)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Canary package version (e.g. 1.0.6 or 1.0.6.1)"
        required: true
        default: "1.0.6"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-canary:
    runs-on: ubuntu-latest

    env:
      PKG_NAME: dockermanager-canary
      PAYLOAD_DIR_NAME: dockermanager
      BUILD_DIR: build

    steps:
      - name: Checkout repository (canary branch)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: canary
          persist-credentials: true

      - name: Prepare DEB packaging structure
        run: |
          set -euo pipefail

          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR/DEBIAN"
          mkdir -p "$BUILD_DIR/usr/share/cockpit/$PAYLOAD_DIR_NAME"

          cp -rT "dockermanager" "$BUILD_DIR/usr/share/cockpit/$PAYLOAD_DIR_NAME"

      - name: Generate DEB control file
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          cat > "$BUILD_DIR/DEBIAN/control" <<EOF
          Package: $PKG_NAME
          Version: $VERSION
          Section: admin
          Priority: optional
          Architecture: all
          Maintainer: Chris Bawden <chrisjbawden@outlook.com>
          Conflicts: dockermanager
          Replaces: dockermanager
          Description: Cockpit plugin – Docker Manager UI (CANARY channel)
           Canary channel with latest changes for testing.
          EOF

          chmod 0755 "$BUILD_DIR/DEBIAN"
          chmod 0644 "$BUILD_DIR/DEBIAN/control"

      - name: Build CANARY .deb
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          dpkg-deb --build --root-owner-group "$BUILD_DIR" "${PKG_NAME}_${VERSION}_all.deb"

          cp "${PKG_NAME}_${VERSION}_all.deb" "${PKG_NAME}-${VERSION}.deb"
          cp "${PKG_NAME}_${VERSION}_all.deb" "${PKG_NAME}.deb"

      - name: Install RPM build tools
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Build CANARY .rpm
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          rm -rf rpmbuild
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          cp -rT dockermanager rpmbuild/SOURCES/dockermanager
          cp LICENSE rpmbuild/SOURCES/LICENSE

          cat > rpmbuild/SPECS/dockermanager-canary.spec <<EOF
          Name:           dockermanager-canary
          Version:        $VERSION
          Release:        1%{?dist}
          Summary:        Cockpit plugin – Docker Manager UI (CANARY channel)
          License:        MIT
          BuildArch:      noarch
          Conflicts:      dockermanager
          Obsoletes:      dockermanager < %{version}

          %description
          Canary channel with latest changes for testing.

          %prep

          %build

          %install
          rm -rf %{buildroot}
          mkdir -p %{buildroot}/usr/share/cockpit/dockermanager
          cp -rT %{_sourcedir}/dockermanager %{buildroot}/usr/share/cockpit/dockermanager
          mkdir -p %{buildroot}/usr/share/licenses/%{name}
          cp %{_sourcedir}/LICENSE %{buildroot}/usr/share/licenses/%{name}/LICENSE

          %files
          %license /usr/share/licenses/%{name}/LICENSE
          %dir /usr/share/cockpit
          /usr/share/cockpit/dockermanager
          EOF

          rpmbuild -bb rpmbuild/SPECS/dockermanager-canary.spec \
            --define "_topdir $PWD/rpmbuild"

          RPM_PATH="$(find rpmbuild/RPMS -type f -name "dockermanager-canary-${VERSION}-1*.rpm" | head -n 1)"

          if [ -z "$RPM_PATH" ]; then
            echo "RPM build output not found"
            exit 1
          fi

          cp "$RPM_PATH" "dockermanager-canary-${VERSION}.rpm"
          cp "$RPM_PATH" "dockermanager-canary.rpm"

      - name: Move CANARY version tag to current commit
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch --tags origin

          if git rev-parse "v${VERSION}-canary" >/dev/null 2>&1; then
            git tag -d "v${VERSION}-canary"
          fi

          git push origin ":refs/tags/v${VERSION}-canary" || true
          git tag "v${VERSION}-canary" "${GITHUB_SHA}"
          git push origin "refs/tags/v${VERSION}-canary" --force

      - name: Move latest-canary tag to current commit
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch --tags origin

          if git rev-parse "latest-canary" >/dev/null 2>&1; then
            git tag -d "latest-canary"
          fi

          git push origin ":refs/tags/latest-canary" || true
          git tag "latest-canary" "${GITHUB_SHA}"
          git push origin "refs/tags/latest-canary" --force

      - name: Delete any draft release for version tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          TAG="v${VERSION}-canary"

          RELEASE_JSON="$(gh release list --limit 100 --json tagName,isDraft,id)"
          RELEASE_ID="$(echo "$RELEASE_JSON" | jq -r ".[] | select(.tagName == \"$TAG\" and .isDraft == true) | .id" | head -n 1)"

          if [ -n "${RELEASE_ID:-}" ] && [ "$RELEASE_ID" != "null" ]; then
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}"
          fi

      - name: Delete any draft release for latest-canary tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="latest-canary"

          RELEASE_JSON="$(gh release list --limit 100 --json tagName,isDraft,id)"
          RELEASE_ID="$(echo "$RELEASE_JSON" | jq -r ".[] | select(.tagName == \"$TAG\" and .isDraft == true) | .id" | head -n 1)"

          if [ -n "${RELEASE_ID:-}" ] && [ "$RELEASE_ID" != "null" ]; then
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}"
          fi

      - name: Create or update versioned CANARY release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          TAG="v${VERSION}-canary"
          TITLE="DockerManager CANARY v${VERSION}"
          NOTES="Automated CANARY release for DockerManager v${VERSION}.
          Package name: dockermanager-canary"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "dockermanager-canary-${VERSION}.deb" \
              "dockermanager-canary-${VERSION}.rpm" \
              --clobber

            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --prerelease \
              --latest=false
          else
            gh release create "$TAG" \
              "dockermanager-canary-${VERSION}.deb" \
              "dockermanager-canary-${VERSION}.rpm" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --prerelease \
              --target "${GITHUB_SHA}" \
              --latest=false
          fi

      - name: Create or update rolling latest-canary release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="latest-canary"
          TITLE="DockerManager CANARY – Latest"
          NOTES="Rolling canary release. Always points to the most recent build."

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "dockermanager-canary.deb" \
              "dockermanager-canary.rpm" \
              --clobber

            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --prerelease \
              --latest=false
          else
            gh release create "$TAG" \
              "dockermanager-canary.deb" \
              "dockermanager-canary.rpm" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --prerelease \
              --target "${GITHUB_SHA}" \
              --latest=false
          fi
