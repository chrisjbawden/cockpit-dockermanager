name: Create filtered promotion branch

on:
  workflow_dispatch:

jobs:
  filter-branch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Fail if branch already exists
        run: |
          if git ls-remote --exit-code --heads origin promote-from-canary; then
            echo "Branch promote-from-canary already exists. Delete it first."
            exit 1
          fi

      - name: Create promotion branch with only dockermanager
        run: |
          git fetch origin

          # Start from main
          git checkout main
          git checkout -b promote-from-canary

          # Bring only dockermanager from canary
          git checkout origin/canary -- dockermanager/

          # Commit changes
          git commit -m "Promote dockermanager from canary"

          # Push branch
          git push origin promote-from-canary
